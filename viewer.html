<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>360 Viewer - Stable Frame System</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

#panorama {
  width: 100%;
  height: 100%;
}

#controls {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  padding: 10px 14px;
  border-radius: 10px;
  z-index: 9999;
  display: flex;
  gap: 10px;
  align-items: center;
  font-family: Arial, sans-serif;
}

button {
  padding: 8px 12px;
  cursor: pointer;
}

#label {
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- ALWAYS PRESENT (fixes frame 1 issue) -->
<div id="controls">
  <button onclick="prevFrame()">◀ Prev</button>
  <button onclick="nextFrame()">Next ▶</button>
  <span id="label">Loading...</span>
</div>

<div id="panorama"></div>

<script>

// ============================
// CONFIG
// ============================
const BASE = "https://sngrooms.github.io/GoPro_Test2/";

// ============================
// GET INPUT FRAME
// ============================
const params = new URLSearchParams(window.location.search);

let raw = params.get("frame") || params.get("img") || "frame_00001";

// ============================
// PARSE FRAME NUMBER
// ============================
function getFrameNumber(str) {
  const match = str.match(/frame_(\d+)/);
  return match ? parseInt(match[1], 10) : 1;
}

function pad(n) {
  return String(n).padStart(5, "0");
}

function makeFrameID(n) {
  return "frame_" + pad(n);
}

function makeLabel(n) {
  return "Frame " + n;
}

// ============================
// STATE
// ============================
let frameNum = getFrameNumber(raw);
let viewer = null;

// ============================
// BUILD IMAGE URL
// ============================
function buildURL(frameID) {
  return `${BASE}${frameID}.jpg?cb=${Date.now()}`;
}

// ============================
// CORE RENDER (ONLY PATH)
// ============================
function render(n, updateURL = true) {

  frameNum = n;

  const frameID = makeFrameID(frameNum);

  // IMPORTANT: update label ALWAYS (fixes frame 1 bug)
  document.getElementById("label").innerText = makeLabel(frameNum);

  const url = buildURL(frameID);

  // destroy old viewer safely
  if (viewer) {
    try { viewer.destroy(); } catch(e) {}
    viewer = null;
  }

  // rebuild viewer
  setTimeout(() => {
    viewer = pannellum.viewer("panorama", {
      type: "equirectangular",
      panorama: url,
      autoLoad: true,
      showControls: false,
      yaw: 180,
      hfov: 100,
      minHfov: 60,
      maxHfov: 120
    });
  }, 30);

  // sync URL without reload (Experience Builder safe)
  if (updateURL) {
    const u = new URL(window.location.href);
    u.searchParams.set("frame", frameID);
    window.history.replaceState({}, "", u.toString());
  }
}

// ============================
// NAVIGATION
// ============================
function nextFrame() {
  render(frameNum + 1);
}

function prevFrame() {
  if (frameNum <= 1) return;
  render(frameNum - 1);
}

// ============================
// INIT (CRITICAL FIX)
// ============================
function init() {
  render(frameNum, false);
}

init();

</script>

</body>
</html>
