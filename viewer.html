<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>360 Viewer - ArcGIS Frame System</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

#panorama {
  width: 100%;
  height: 100%;
}

#hud {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 10px 14px;
  border-radius: 10px;
  font-family: Arial, sans-serif;
  font-weight: bold;
  z-index: 9999;
}
</style>
</head>

<body>

<div id="hud">Loading...</div>
<div id="panorama"></div>

<script>

// ============================
// CONFIG
// ============================
const BASE = "https://sngrooms.github.io/GoPro_Test2/";

// ============================
// GET FRAME FROM ARCGIS URL
// ============================
const params = new URLSearchParams(window.location.search);

// Expected: frame_00001
let frameID = params.get("frame") || params.get("img");

if (!frameID) {
  document.body.innerHTML = "<h2 style='color:white'>No frame provided</h2>";
  throw new Error("Missing frame parameter");
}

// ============================
// BUILD IMAGE URL
// ============================
function buildImageURL(id) {
  // ensure extension
  let url = `${BASE}${id}.jpg`;

  // CRITICAL: cache bust so EB + browser + pannellum NEVER reuse texture
  return url + "?cb=" + Date.now();
}

// ============================
// VIEWER HOLDER
// ============================
let viewer = null;

// ============================
// SAFE INIT / REINIT
// ============================
function loadViewer(imageUrl, label) {

  document.getElementById("hud").innerText = label;

  // destroy previous instance (IMPORTANT for Experience Builder)
  if (viewer) {
    try {
      viewer.destroy();
    } catch (e) {}
    viewer = null;
  }

  // small delay ensures WebGL context fully releases (prevents ghost textures)
  setTimeout(() => {

    viewer = pannellum.viewer("panorama", {
      type: "equirectangular",
      panorama: imageUrl,

      autoLoad: true,
      showControls: false,

      yaw: 180,
      hfov: 100,
      minHfov: 60,
      maxHfov: 120,

      // improves stability in embedded environments
      dynamicUpdate: false
    });

  }, 50);
}

// ============================
// INIT
// ============================
const imageURL = buildImageURL(frameID);

loadViewer(imageURL, frameID);

</script>

</body>
</html>
