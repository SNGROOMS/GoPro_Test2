<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>360 Viewer (High Quality)</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: black;
  overflow: hidden;
}

#panorama {
  width: 100%;
  height: 100%;
}

/* UI */
#controls {
  position: fixed;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 10px;
  border-radius: 10px;
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 10px;
}

button {
  padding: 8px 12px;
  cursor: pointer;
}

#label {
  color: white;
  font-family: Arial;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="controls">
  <button onclick="prev()">◀ Prev</button>
  <button onclick="next()">Next ▶</button>
  <span id="label"></span>
</div>

<div id="panorama"></div>

<script>

// ===============================
// CONFIG
// ===============================
const BASE = "https://sngrooms.github.io/GoPro_Test2/";

// enforce correct image naming
function pad(n) {
  return String(n).padStart(5, "0");
}

function frameURL(n) {
  return `${BASE}frame_${pad(n)}.jpg`;
}

// ===============================
// GET INITIAL FRAME
// ===============================
const params = new URLSearchParams(window.location.search);
let frame = parseInt(params.get("frame") || "1", 10);

// ===============================
// HIGH QUALITY RENDER FIX
// ===============================

// FORCE HIGH DPI CANVAS (this is HUGE)
const dpr = window.devicePixelRatio || 1;

// override pannellum sizing behavior
pannellum.viewer.prototype.getCanvasSize = function () {
  return {
    width: this.container.clientWidth * dpr,
    height: this.container.clientHeight * dpr
  };
};

// ===============================
// VIEWER INIT
// ===============================
let viewer = pannellum.viewer("panorama", {
  type: "equirectangular",
  panorama: frameURL(frame),

  autoLoad: true,
  showControls: false,
  yaw: 180,

  // QUALITY BOOST SETTINGS
  hfov: 100,
  minHfov: 60,
  maxHfov: 120,

  // prevents internal smoothing artifacts
  autoRotate: false
});

document.getElementById("label").innerText = `Frame ${frame}`;

// ===============================
// FRAME NAVIGATION (NO RELOAD)
// ===============================

function loadFrame(n) {
  if (n < 1) return;

  frame = n;
  document.getElementById("label").innerText = `Frame ${frame}`;

  const newURL = frameURL(frame);

  // preload image BEFORE swapping (prevents blur flash)
  const img = new Image();
  img.src = newURL;

  img.onload = () => {
    viewer.destroy();

    viewer = pannellum.viewer("panorama", {
      type: "equirectangular",
      panorama: newURL,
      autoLoad: true,
      showControls: false,
      yaw: 180,
      hfov: 100,
      minHfov: 60,
      maxHfov: 120
    });
  };

  // update URL without reload (IMPORTANT for Experience Builder)
  const url = new URL(window.location.href);
  url.searchParams.set("frame", frame);
  window.history.replaceState({}, "", url.toString());
}

function next() {
  loadFrame(frame + 1);
}

function prev() {
  loadFrame(frame - 1);
}

</script>

</body>
</html>
